<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elsa Editor Harness</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div>
          <p class="eyebrow">Fabric</p>
          <h1>Elsa Editor Harness</h1>
          <p class="subtle">Standalone static page for debugging Elsa custom element rendering.</p>
        </div>
        <form id="config-form" class="config-grid">
          <label class="field">
            <span>Backend URL</span>
            <input id="backend-url" name="backend-url" type="url" spellcheck="false" />
          </label>
          <label class="field">
            <span>Access token</span>
            <textarea id="access-token" name="access-token" rows="3" spellcheck="false"></textarea>
          </label>
          <label class="field">
            <span>Definition ID</span>
            <input id="definition-id" name="definition-id" type="text" spellcheck="false" />
          </label>
          <div class="actions">
            <button type="submit">Reload editor</button>
            <button id="clear-log" type="button" class="secondary">Clear log</button>
          </div>
        </form>
      </header>

      <main class="workspace">
        <section class="panel panel-editor">
          <div class="panel-header">
            <h2>Editor</h2>
            <p id="status-text" class="subtle">Booting…</p>
          </div>
          <div id="editor-host" class="editor-host"></div>
        </section>

        <aside class="panel panel-log">
          <div class="panel-header">
            <h2>Log</h2>
            <p class="subtle">Asset load + mount trace</p>
          </div>
          <pre id="log-output" class="log-output" aria-live="polite"></pre>
        </aside>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
